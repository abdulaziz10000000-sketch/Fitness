<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>IRON ELITE | منصة التدريب الاحترافية</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Cinzel:wght@500;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
@import url('https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;900&display=swap');
:root{
  --bg-primary:#0a0a0f;--bg-secondary:#12121a;--bg-card:rgba(20,20,30,0.6);
  --gold:#d4af37;--gold-bright:#f4cf57;--gold-dim:#8a7028;
  --silver:#c0c0c8;--silver-bright:#e8e8f0;
  --blue-deep:#0a1628;--blue-electric:#1e3a5f;
  --red-accent:#c8102e;--green-success:#4ade80;
  --text-primary:#f0f0f5;--text-secondary:#a0a0b0;
  --border-subtle:rgba(212,175,55,0.15);--border-gold:rgba(212,175,55,0.4);
  --shadow-gold:0 0 40px rgba(212,175,55,0.15);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{overflow-x:hidden}
body{font-family:'Cairo',sans-serif;background:var(--bg-primary);color:var(--text-primary);min-height:100vh;position:relative;line-height:1.6}

.bg-layer{position:fixed;inset:0;z-index:-2;overflow:hidden}
.bg-gradient{position:absolute;inset:0;background:radial-gradient(ellipse at 20% 0%,rgba(30,58,95,0.4) 0%,transparent 50%),radial-gradient(ellipse at 80% 100%,rgba(212,175,55,0.08) 0%,transparent 50%),radial-gradient(ellipse at 50% 50%,rgba(10,22,40,0.5) 0%,transparent 70%),linear-gradient(180deg,#0a0a0f 0%,#0d0d18 50%,#0a0a0f 100%)}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(212,175,55,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(212,175,55,0.03) 1px,transparent 1px);background-size:60px 60px;mask-image:radial-gradient(ellipse at center,black 30%,transparent 80%)}
.bg-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.3;animation:float 20s ease-in-out infinite}
.bg-orb-1{width:500px;height:500px;background:radial-gradient(circle,#d4af37,transparent);top:-10%;right:-10%}
.bg-orb-2{width:400px;height:400px;background:radial-gradient(circle,#1e3a5f,transparent);bottom:-10%;left:-10%;animation-delay:-10s}
.bg-orb-3{width:300px;height:300px;background:radial-gradient(circle,#c8102e,transparent);top:50%;left:30%;animation-delay:-5s;opacity:0.15}
@keyframes float{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(50px,-30px) scale(1.1)}66%{transform:translate(-30px,50px) scale(0.95)}}
.bg-particles{position:absolute;inset:0;overflow:hidden}
.particle{position:absolute;width:2px;height:2px;background:var(–gold);border-radius:50%;animation:particleRise linear infinite;opacity:0}
@keyframes particleRise{0%{transform:translateY(100vh);opacity:0}10%{opacity:0.6}90%{opacity:0.6}100%{transform:translateY(-10vh);opacity:0}}
.bg-noise{position:absolute;inset:0;opacity:0.03;background-image:url(“data:image/svg+xml,%3Csvg viewBox=‘0 0 200 200’ xmlns=‘http://www.w3.org/2000/svg’%3E%3Cfilter id=‘n’%3E%3CfeTurbulence type=‘fractalNoise’ baseFrequency=‘0.9’ /%3E%3C/filter%3E%3Crect width=‘100%25’ height=‘100%25’ filter=‘url(%23n)’/%3E%3C/svg%3E”)}

.toast-container{position:fixed;top:80px;left:50%;transform:translateX(-50%);z-index:10000;display:flex;flex-direction:column;gap:10px;pointer-events:none}
.toast{padding:14px 24px;border-radius:12px;backdrop-filter:blur(20px);font-size:14px;font-weight:600;display:flex;align-items:center;gap:10px;animation:toastIn 0.4s cubic-bezier(0.16,1,0.3,1),toastOut 0.4s 2.8s forwards;box-shadow:0 10px 40px rgba(0,0,0,0.4);pointer-events:all;min-width:280px}
.toast-success{background:rgba(74,222,128,0.15);border:1px solid rgba(74,222,128,0.4);color:var(–green-success)}
.toast-error{background:rgba(200,16,46,0.15);border:1px solid rgba(200,16,46,0.4);color:#ff6b85}
.toast-info{background:rgba(212,175,55,0.15);border:1px solid var(–border-gold);color:var(–gold-bright)}
@keyframes toastIn{from{opacity:0;transform:translateY(-30px) scale(0.9)}to{opacity:1;transform:translateY(0) scale(1)}}
@keyframes toastOut{to{opacity:0;transform:translateY(-30px) scale(0.9)}}

.login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;position:relative}
.login-card{width:100%;max-width:440px;background:#14141e;background:linear-gradient(135deg,rgba(20,20,30,0.95),rgba(10,10,20,0.98));border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:50px 40px;box-shadow:0 0 40px rgba(212,175,55,0.15),0 30px 80px rgba(0,0,0,0.5);position:relative;animation:slideUp 0.8s cubic-bezier(0.16,1,0.3,1)}
@keyframes slideUp{from{opacity:0;transform:translateY(40px)}to{opacity:1;transform:translateY(0)}}
.login-card::before{content:’’;position:absolute;inset:-1px;border-radius:20px;background:linear-gradient(135deg,var(–gold),transparent 30%,transparent 70%,var(–gold));z-index:-1;opacity:0.5}
.brand-logo{text-align:center;margin-bottom:40px}
.brand-logo h1{font-family:‘Cinzel’,‘Times New Roman’,Georgia,serif;font-weight:900;font-size:42px;letter-spacing:8px;color:#d4af37;margin-bottom:8px;filter:drop-shadow(0 0 15px rgba(212,175,55,0.5));animation:logoGlow 3s ease-in-out infinite}
@supports(-webkit-background-clip:text){
.brand-logo h1{background:linear-gradient(180deg,#f4cf57 0%,#d4af37 50%,#8a7028 100%);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
}
@keyframes logoGlow{0%,100%{filter:drop-shadow(0 0 10px rgba(212,175,55,0.3))}50%{filter:drop-shadow(0 0 25px rgba(212,175,55,0.6))}}
.brand-logo .divider{height:1px;width:80px;margin:12px auto;background:linear-gradient(90deg,transparent,var(–gold),transparent)}
.brand-logo p{color:var(–silver);font-size:11px;letter-spacing:6px;text-transform:uppercase;font-weight:600}
.tab-switch{display:flex;gap:4px;background:rgba(0,0,0,0.4);padding:4px;border-radius:12px;margin-bottom:30px;border:1px solid rgba(255,255,255,0.05)}
.tab-switch button{flex:1;padding:12px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:var(–text-primary);font-family:‘Cairo’,sans-serif;font-weight:600;font-size:14px;cursor:pointer;border-radius:8px;transition:all 0.3s}
.tab-switch button.active{background:linear-gradient(135deg,var(–gold),var(–gold-dim));color:#0a0a0f;box-shadow:0 4px 15px rgba(212,175,55,0.3)}
.input-group{margin-bottom:18px}
.input-group label{display:block;font-size:12px;color:var(–silver);margin-bottom:8px;letter-spacing:1px;font-weight:600}
.input-group input,.input-group select,.input-group textarea{width:100%;padding:14px 16px;background:#1a1a25 !important;border:1px solid rgba(255,255,255,0.15);border-radius:10px;color:#f0f0f5 !important;font-family:‘Cairo’,sans-serif;font-size:15px;transition:all 0.3s;-webkit-appearance:none;appearance:none}
.input-group input::placeholder{color:#707080}
.input-group input:focus,.input-group select:focus,.input-group textarea:focus{outline:none;border-color:#d4af37;box-shadow:0 0 0 3px rgba(212,175,55,0.15);background:#111118 !important}
.btn-primary{width:100%;padding:16px;background:#d4af37;background:linear-gradient(135deg,#f4cf57,#d4af37,#8a7028);color:#0a0a0f;border:none;border-radius:10px;font-family:‘Cairo’,sans-serif;font-weight:700;font-size:15px;letter-spacing:2px;cursor:pointer;text-transform:uppercase;margin-top:10px;transition:all 0.3s;position:relative;overflow:hidden}
.btn-primary::before{content:’’;position:absolute;top:0;left:-100%;width:100%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);transition:left 0.6s}
.btn-primary:hover::before{left:100%}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 10px 30px rgba(212,175,55,0.4)}
.demo-info{margin-top:20px;padding:14px;text-align:center;background:rgba(212,175,55,0.05);border:1px solid var(–border-subtle);border-radius:10px;font-size:12px;color:var(–silver)}
.demo-info strong{color:var(–gold);display:block;margin-bottom:4px;letter-spacing:1px}
.error-msg{background:rgba(200,16,46,0.1);border:1px solid rgba(200,16,46,0.3);color:#ff6b85;padding:12px;border-radius:8px;font-size:13px;margin-bottom:16px;text-align:center}

.app{display:none;min-height:100vh;flex-direction:column}
.app.active{display:flex}
.topbar{position:sticky;top:0;z-index:100;background:#0c0c14;border-bottom:1px solid rgba(212,175,55,0.15);padding:14px 24px;display:flex;align-items:center;justify-content:space-between}
.topbar-brand h2{font-family:‘Cinzel’,‘Times New Roman’,Georgia,serif;font-weight:900;font-size:20px;letter-spacing:4px;color:#d4af37}
@supports(-webkit-background-clip:text){
.topbar-brand h2{background:linear-gradient(180deg,var(–gold-bright),var(–gold-dim));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
}
.user-pill{display:flex;align-items:center;gap:10px;background:rgba(212,175,55,0.08);border:1px solid var(–border-gold);padding:8px 14px;border-radius:20px;font-size:13px;transition:all 0.3s}
.user-pill:hover{background:rgba(212,175,55,0.15);box-shadow:0 4px 15px rgba(212,175,55,0.2)}
.user-pill .role-badge{background:linear-gradient(135deg,var(–gold),var(–gold-dim));color:#0a0a0f;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700;letter-spacing:1px}
.logout-btn{background:none;border:1px solid rgba(200,16,46,0.4);color:#ff6b85;padding:6px 12px;border-radius:8px;font-family:‘Cairo’,sans-serif;font-size:12px;cursor:pointer;margin-right:8px;transition:all 0.3s}
.logout-btn:hover{background:rgba(200,16,46,0.1);transform:translateY(-1px)}

.nav-tabs{display:flex;gap:6px;padding:16px 20px;overflow-x:auto;scrollbar-width:none;background:rgba(10,10,15,0.5);border-bottom:1px solid var(–border-subtle)}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{flex-shrink:0;padding:10px 18px;background:#131318;border:1px solid rgba(255,255,255,0.1);color:#a0a0b0;border-radius:10px;cursor:pointer;font-family:‘Cairo’,sans-serif;font-weight:600;font-size:13px;transition:all 0.3s;white-space:nowrap;position:relative}
.nav-tab:hover{border-color:var(–border-gold);color:var(–text-primary);transform:translateY(-1px)}
.nav-tab.active{background:linear-gradient(135deg,#2a2415,#1a1810);border-color:#d4af37;color:#f4cf57;box-shadow:0 4px 20px rgba(212,175,55,0.15)}
.nav-tab.active::after{content:’’;position:absolute;bottom:-17px;left:50%;transform:translateX(-50%);width:30px;height:2px;background:var(–gold-bright)}

.content{flex:1;padding:24px;max-width:1400px;margin:0 auto;width:100%}
.page{display:none;animation:fadeIn 0.5s cubic-bezier(0.16,1,0.3,1)}
.page.active{display:block}
@keyframes fadeIn{from{opacity:0;transform:translateY(15px)}to{opacity:1;transform:translateY(0)}}

.page-header{margin-bottom:28px;animation:slideInRight 0.6s cubic-bezier(0.16,1,0.3,1)}
@keyframes slideInRight{from{opacity:0;transform:translateX(20px)}to{opacity:1;transform:translateX(0)}}
.page-header h2{font-family:‘Cinzel’,‘Times New Roman’,Georgia,serif;font-size:28px;font-weight:700;color:var(–silver-bright);letter-spacing:2px;margin-bottom:6px}
@supports(-webkit-background-clip:text){
.page-header h2{background:linear-gradient(180deg,var(–silver-bright),var(–silver));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
}
.page-header p{color:var(–text-secondary);font-size:14px}

.card{background:#16161f;border:1px solid rgba(212,175,55,0.15);border-radius:16px;padding:24px;transition:all 0.4s cubic-bezier(0.16,1,0.3,1);position:relative;overflow:hidden;animation:cardIn 0.5s cubic-bezier(0.16,1,0.3,1) backwards}
@keyframes cardIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.card:hover{border-color:rgba(212,175,55,0.4);transform:translateY(-3px);box-shadow:0 15px 40px rgba(0,0,0,0.3),0 0 20px rgba(212,175,55,0.1)}
.card-title{font-family:‘Cinzel’,‘Times New Roman’,Georgia,serif;font-size:16px;letter-spacing:2px;color:var(–gold-bright);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.grid{display:grid;gap:18px}
.grid-2{grid-template-columns:repeat(auto-fit,minmax(280px,1fr))}
.grid-3{grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}
.grid-4{grid-template-columns:repeat(auto-fit,minmax(180px,1fr))}
.grid > .card:nth-child(1){animation-delay:0.05s}
.grid > .card:nth-child(2){animation-delay:0.1s}
.grid > .card:nth-child(3){animation-delay:0.15s}
.grid > .card:nth-child(4){animation-delay:0.2s}
.grid > .card:nth-child(5){animation-delay:0.25s}
.grid > .card:nth-child(6){animation-delay:0.3s}

.stat-card{background:linear-gradient(135deg,#1d1a12,#15151f);border:1px solid var(–border-subtle);border-radius:14px;padding:18px;text-align:center;position:relative;overflow:hidden;transition:all 0.3s}
.stat-card:hover{transform:translateY(-2px) scale(1.02);border-color:var(–border-gold)}
.stat-card::before{content:’’;position:absolute;top:0;right:0;width:60px;height:60px;background:radial-gradient(circle,rgba(212,175,55,0.2),transparent 70%)}
.stat-value{font-family:‘Bebas Neue’,sans-serif;font-size:36px;color:var(–gold-bright);letter-spacing:1px;line-height:1;margin-bottom:6px}
.stat-label{font-size:11px;color:var(–silver);letter-spacing:1.5px;text-transform:uppercase}

.btn{padding:12px 20px;border-radius:10px;border:none;font-family:‘Cairo’,sans-serif;font-weight:600;font-size:13px;cursor:pointer;transition:all 0.3s;display:inline-flex;align-items:center;gap:8px;position:relative;overflow:hidden}
.btn::after{content:’’;position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,0.3);transform:translate(-50%,-50%);transition:width 0.4s,height 0.4s}
.btn:active::after{width:200%;height:200%;transition:0s}
.btn-gold{background:#d4af37;background:linear-gradient(135deg,#f4cf57,#8a7028);color:#0a0a0f}
.btn-gold:hover{box-shadow:0 6px 20px rgba(212,175,55,0.4);transform:translateY(-2px)}
.btn-outline{background:transparent;border:1px solid var(–border-gold);color:var(–gold-bright)}
.btn-outline:hover{background:rgba(212,175,55,0.1);transform:translateY(-1px)}
.btn-danger{background:rgba(200,16,46,0.15);border:1px solid rgba(200,16,46,0.4);color:#ff6b85}
.btn-danger:hover{background:rgba(200,16,46,0.25)}
.btn-sm{padding:8px 14px;font-size:12px}

.day-tabs{display:flex;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:8px}
.day-tab{flex-shrink:0;padding:12px 18px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);color:var(–text-secondary);border-radius:10px;cursor:pointer;font-family:‘Cairo’,sans-serif;font-weight:600;font-size:13px;transition:all 0.3s;min-width:140px;text-align:center}
.day-tab:hover{transform:translateY(-2px);border-color:var(–border-gold)}
.day-tab.active{background:linear-gradient(135deg,rgba(212,175,55,0.15),transparent);border-color:var(–gold);color:var(–gold-bright)}
.day-tab .day-num{display:block;font-family:‘Bebas Neue’;font-size:18px;color:var(–gold)}

.exercise-card{background:#15151f;border:1px solid var(–border-subtle);border-radius:14px;padding:18px;margin-bottom:14px;cursor:pointer;transition:all 0.3s;display:flex;align-items:center;gap:16px;animation:cardIn 0.4s cubic-bezier(0.16,1,0.3,1) backwards}
.exercise-card:hover{border-color:var(–border-gold);transform:translateX(-6px);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.exercise-icon{width:50px;height:50px;border-radius:12px;background:linear-gradient(135deg,var(–gold),var(–gold-dim));display:flex;align-items:center;justify-content:center;font-family:‘Bebas Neue’;font-size:22px;color:#0a0a0f;flex-shrink:0;transition:all 0.3s}
.exercise-card:hover .exercise-icon{transform:rotate(-5deg) scale(1.1);box-shadow:0 5px 15px rgba(212,175,55,0.4)}
.exercise-info{flex:1}
.exercise-info h4{font-size:15px;margin-bottom:4px;color:var(–text-primary)}
.exercise-info p{font-size:12px;color:var(–silver)}
.exercise-meta{display:flex;gap:8px;flex-shrink:0;flex-direction:column;align-items:flex-end}
.exercise-tag{padding:3px 10px;border-radius:8px;font-size:10px;background:rgba(212,175,55,0.1);color:var(–gold-bright);letter-spacing:1px;font-weight:600}
.exercise-tag.video{background:rgba(200,16,46,0.1);color:#ff8fa3}

.video-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#000;border-radius:12px;overflow:hidden;margin-bottom:16px;border:1px solid var(–border-subtle)}
.video-wrap iframe,.video-wrap video{position:absolute;inset:0;width:100%;height:100%;border:none}
.video-placeholder{display:flex;align-items:center;justify-content:center;flex-direction:column;height:100%;gap:10px;color:var(–silver);font-size:13px}
.video-placeholder .icon{font-size:48px;opacity:0.3}

.modal{display:none;position:fixed;inset:0;z-index:1000;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);align-items:center;justify-content:center;padding:20px;animation:fadeIn 0.3s}
.modal.active{display:flex}
.modal-content{background:#14141e;border:1px solid rgba(212,175,55,0.3);border-radius:20px;padding:30px;max-width:640px;width:100%;max-height:90vh;overflow-y:auto;box-shadow:0 30px 80px rgba(0,0,0,0.7);animation:slideUp 0.4s cubic-bezier(0.16,1,0.3,1)}
.modal-content.wide{max-width:900px}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;padding-bottom:16px;border-bottom:1px solid var(–border-subtle)}
.modal-header h3{font-family:‘Cinzel’,‘Times New Roman’,Georgia,serif;color:var(–gold-bright);font-size:20px;letter-spacing:2px}
.modal-close{background:none;border:none;color:var(–silver);font-size:28px;cursor:pointer;line-height:1;transition:all 0.3s;width:32px;height:32px;border-radius:50%}
.modal-close:hover{background:rgba(200,16,46,0.15);color:#ff6b85;transform:rotate(90deg)}

.sets-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(70px,1fr));gap:10px;margin:20px 0}
.set-bubble{aspect-ratio:1;border-radius:50%;background:rgba(255,255,255,0.05);border:2px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-family:‘Bebas Neue’;font-size:20px;color:var(–silver);cursor:pointer;transition:all 0.3s}
.set-bubble:hover{transform:scale(1.05);border-color:var(–gold)}
.set-bubble.done{background:linear-gradient(135deg,var(–gold),var(–gold-dim));border-color:var(–gold-bright);color:#0a0a0f;box-shadow:0 0 20px rgba(212,175,55,0.4);transform:scale(1.05);animation:setDone 0.5s cubic-bezier(0.16,1,0.3,1)}
@keyframes setDone{0%{transform:scale(0.8) rotate(-10deg)}50%{transform:scale(1.15) rotate(5deg)}100%{transform:scale(1.05) rotate(0)}}

.progress-bar{height:8px;background:rgba(255,255,255,0.05);border-radius:4px;overflow:hidden;margin-top:8px;position:relative}
.progress-fill{height:100%;background:linear-gradient(90deg,var(–gold-dim),var(–gold-bright));transition:width 0.8s cubic-bezier(0.16,1,0.3,1);border-radius:4px;position:relative}
.progress-fill::after{content:’’;position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.3),transparent);animation:progressShimmer 2s infinite}
@keyframes progressShimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}

.table-wrap{overflow-x:auto;border-radius:12px;border:1px solid var(–border-subtle)}
table{width:100%;border-collapse:collapse}
th,td{padding:12px 16px;text-align:right;font-size:13px}
th{background:rgba(212,175,55,0.08);color:var(–gold-bright);font-weight:600;letter-spacing:1px;font-size:12px;border-bottom:1px solid var(–border-gold)}
td{border-bottom:1px solid rgba(255,255,255,0.04);color:var(–text-primary)}
tr{transition:background 0.2s}
tr:hover td{background:rgba(212,175,55,0.05)}

.food-item{display:grid;grid-template-columns:1fr auto auto;gap:12px;align-items:center;padding:14px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.05);border-radius:10px;margin-bottom:8px;transition:all 0.3s}
.food-item:hover{background:rgba(212,175,55,0.05);border-color:var(–border-subtle);transform:translateX(-4px)}
.food-name{font-weight:600;font-size:14px}

.tier-gold{background:linear-gradient(135deg,var(–gold-bright),var(–gold-dim));color:#0a0a0f}
.tier-elite{background:linear-gradient(135deg,#c8102e,#8b0000);color:#fff;box-shadow:0 0 15px rgba(200,16,46,0.4)}

.status-badge{display:inline-block;padding:3px 10px;border-radius:8px;font-size:10px;font-weight:600;letter-spacing:1px}

.rest-circle{width:240px;height:240px;border-radius:50%;background:radial-gradient(circle,rgba(212,175,55,0.1),transparent);border:3px solid var(–gold);display:flex;align-items:center;justify-content:center;font-family:‘Bebas Neue’;font-size:80px;color:var(–gold-bright);box-shadow:0 0 60px rgba(212,175,55,0.4);animation:pulse 1s infinite;margin-bottom:30px;position:relative}

@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
.rest-label{font-family:‘Cinzel’,‘Times New Roman’,Georgia,serif;letter-spacing:6px;color:var(–silver);font-size:14px;margin-bottom:30px}

.input-row.cols-3{grid-template-columns:1fr 1fr 1fr}
.input-row input,.input-row select{width:100%;padding:10px;background:#1a1a25 !important;border:1px solid rgba(255,255,255,0.15);border-radius:8px;color:#f0f0f5 !important;font-family:‘Cairo’,sans-serif;-webkit-appearance:none;appearance:none}
.input-row input::placeholder{color:#707080}
.input-row input:focus,.input-row select:focus{outline:none;border-color:#d4af37;background:#111118 !important}

.water-fill{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(180deg,#4a9eff,#1e6cd9);transition:height 1s cubic-bezier(0.16,1,0.3,1);box-shadow:inset 0 4px 10px rgba(255,255,255,0.3)}

const CLOUD_CONFIG = {
  enabled: false,
  binId: '',
  apiKey: '',
  baseUrl: 'https://api.jsonbin.io/v3/b'
};
let cloudSyncStatus = 'local';
let lastSyncTime = null;

function cloudSave(){
  if(!CLOUD_CONFIG.enabled||!CLOUD_CONFIG.binId||!CLOUD_CONFIG.apiKey)return;
  cloudSyncStatus='syncing';updateSyncBadge();
  fetch(CLOUD_CONFIG.baseUrl+'/'+CLOUD_CONFIG.binId,{
    method:'PUT',
    headers:{'Content-Type':'application/json','X-Master-Key':CLOUD_CONFIG.apiKey,'X-Bin-Versioning':'false'},
    body:JSON.stringify(state)
  }).then(res=>{
    cloudSyncStatus=res.ok?'synced':'error';
    if(res.ok)lastSyncTime=new Date();
    updateSyncBadge();
  }).catch(()=>{cloudSyncStatus='error';updateSyncBadge()});
}

function cloudLoad(callback){
  if(!CLOUD_CONFIG.enabled||!CLOUD_CONFIG.binId||!CLOUD_CONFIG.apiKey){if(callback)callback(false);return}
  cloudSyncStatus='syncing';updateSyncBadge();
  fetch(CLOUD_CONFIG.baseUrl+'/'+CLOUD_CONFIG.binId+'/latest',{
    headers:{'X-Master-Key':CLOUD_CONFIG.apiKey}
  }).then(res=>res.json()).then(data=>{
    if(data.record&&data.record.users){
      applyLoadedData(data.record);
      localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
      cloudSyncStatus='synced';lastSyncTime=new Date();
    }else{cloudSyncStatus='error'}
    updateSyncBadge();
    if(callback)callback(cloudSyncStatus==='synced');
  }).catch(()=>{cloudSyncStatus='error';updateSyncBadge();if(callback)callback(false)});
}

function updateSyncBadge(){
  const b=document.getElementById('syncBadge');
  if(!b)return;
  const icons={local:'💾',syncing:'⏳',synced:'☁️',error:'⚠️'};
  const colors={local:'#a0a0b0',syncing:'#f59e0b',synced:'#4ade80',error:'#ff6b85'};
  b.textContent=icons[cloudSyncStatus]||'💾';
  b.style.color=colors[cloudSyncStatus]||'#a0a0b0';
}

function applyLoadedData(parsed){
  if(parsed.users&&parsed.users.length>0)state.users=parsed.users;
  if(parsed.exercises){Object.keys(parsed.exercises).forEach(cat=>{state.exercises[cat]=parsed.exercises[cat]})}
  if(parsed.program)state.program=parsed.program;
  if(parsed.foods&&parsed.foods.length>0)state.foods=parsed.foods;
  if(parsed.challenges)state.challenges=parsed.challenges;
  if(parsed.workoutLogs)state.workoutLogs=parsed.workoutLogs;
  if(parsed.measurements)state.measurements=parsed.measurements;
  if(parsed.waterLogs)state.waterLogs=parsed.waterLogs;
  if(parsed.attendanceLogs)state.attendanceLogs=parsed.attendanceLogs;
  if(parsed.warmupVideos)state.warmupVideos=parsed.warmupVideos;
  if(parsed.mealPlans)state.mealPlans=parsed.mealPlans;
}

function ensureDefaults(){
  if(!state.exercises.cardio)state.exercises.cardio=DEFAULT_EXERCISES.cardio;
  if(!state.warmupVideos)state.warmupVideos={push:'',pull:'',legs:'',cardio:''};
  if(!state.attendanceLogs)state.attendanceLogs={};
}

function loadState(){
  // Load from localStorage (instant, always works)
  var saved=localStorage.getItem(STORAGE_KEY);
  if(saved){try{applyLoadedData(JSON.parse(saved))}catch(e){console.error(e)}}
  ensureDefaults();
  // Then try cloud in background (non-blocking)
  if(CLOUD_CONFIG.enabled){
    cloudLoad(function(ok){
      if(ok){ensureDefaults();localStorage.setItem(STORAGE_KEY,JSON.stringify(state))}
    });
  }
}

var saveTimer=null;
function saveState(){
  localStorage.setItem(STORAGE_KEY,JSON.stringify(state));
  if(CLOUD_CONFIG.enabled){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){cloudSave()},2000);
  }
}

function renderMealPlan(cals,dayIdx){
  const template=MEAL_TEMPLATES[(dayIdx-1)%7];
  const baseTotal=calculateMealsTotal(template);
  const scale=cals/baseTotal;
  const mealNames=['الفطور','سناك 1','الغداء','سناك 2','العشاء'];
  let totalP=0,totalC=0,totalF=0,totalCals=0,mealsHtml='';
  template.forEach((meal,i)=>{
    let mCals=0,mP=0,mC=0,mF=0,items='';
    meal.forEach(item=>{
      const food=state.foods.find(f=>f.name===item.name);
      if(!food)return;
      let cals_,p,c,fat_,label;
      if(item.grams){
        const g=Math.round(item.grams*scale);
        cals_=Math.round(food.cals*g/100);
        p=Math.round(food.protein*g/100*10)/10;
        c=Math.round(food.carbs*g/100*10)/10;
        fat_=Math.round(food.fat*g/100*10)/10;
        label=`${g} جرام`;
      }else{
        const ct=Math.max(1,Math.round(item.count*scale));
        cals_=food.cals*ct;
        p=Math.round(food.protein*ct*10)/10;
        c=Math.round(food.carbs*ct*10)/10;
        fat_=Math.round(food.fat*ct*10)/10;
        label=`${ct} ${ct===1?'حبة':'حبات'}`;
      }
      mCals+=cals_;mP+=p;mC+=c;mF+=fat_;
      items+=`<div class="food-item"><div><div class="food-name">${food.name}</div><div class="food-portion">${label} • ${p}ج ب • ${c}ج ك • ${fat_}ج د</div></div><div></div><div class="food-cals">${cals_}</div></div>`;
    });
    totalCals+=mCals;totalP+=mP;totalC+=mC;totalF+=mF;
    mealsHtml+=`<div class="card" style="margin-bottom:14px"><div class="card-title">${mealNames[i]} <span style="margin-right:auto;font-family:'Bebas Neue';font-size:20px;color:var(--gold-bright)">${Math.round(mCals)} سعرة</span></div>${items}</div>`;
  });
  const pP=totalCals>0?(totalP*4/totalCals)*100:0;
  const pC=totalCals>0?(totalC*4/totalCals)*100:0;
  const pF=totalCals>0?(totalF*9/totalCals)*100:0;
  return `
    <div class="grid grid-4" style="margin-bottom:20px">
      <div class="stat-card"><div class="stat-value">${Math.round(totalCals)}</div><div class="stat-label">السعرات</div></div>
      <div class="stat-card"><div class="stat-value">${Math.round(totalP)}ج</div><div class="stat-label">بروتين</div></div>
      <div class="stat-card"><div class="stat-value">${Math.round(totalC)}ج</div><div class="stat-label">كارب</div></div>
      <div class="stat-card"><div class="stat-value">${Math.round(totalF)}ج</div><div class="stat-label">دهون</div></div>
    </div>
    <div class="card" style="margin-bottom:20px">
      <div class="card-title">توزيع الماكروز</div>
      <div class="macro-bar">
        <div class="macro-segment macro-p" style="width:${pP}%"></div>
        <div class="macro-segment macro-c" style="width:${pC}%"></div>
        <div class="macro-segment macro-f" style="width:${pF}%"></div>
      </div>
      <div style="display:flex;justify-content:space-between;margin-top:10px;font-size:12px">
        <span style="color:#4ade80">● بروتين ${Math.round(pP)}%</span>
        <span style="color:#60a5fa">● كارب ${Math.round(pC)}%</span>
        <span style="color:#f59e0b">● دهون ${Math.round(pF)}%</span>
      </div>
    </div>
    ${mealsHtml}`;
}

function calculateMealsTotal(template){
  let total=0;
  template.forEach(meal=>meal.forEach(item=>{
    const food=state.foods.find(f=>f.name===item.name);
    if(!food)return;
    if(item.grams)total+=food.cals*item.grams/100;
    else total+=food.cals*item.count;
  }));
  return total;
}

function playBeep(){
try{
const ctx=new (window.AudioContext||window.webkitAudioContext)();
const o=ctx.createOscillator(),g=ctx.createGain();
o.connect(g);g.connect(ctx.destination);
o.frequency.value=800;
g.gain.setValueAtTime(0.3,ctx.currentTime);
g.gain.exponentialRampToValueAtTime(0.01,ctx.currentTime+0.5);
o.start();o.stop(ctx.currentTime+0.5);
}catch(e){}
}

function calculateBF(){

bf=495/(1.29579-0.35004*Math.log10(w+hp-n)+0.22100*Math.log10(h))-450;
}
bf=Math.max(3,bf);
let cat,col;
if(g===‘male’){

else if(bf<14){cat=‘رياضي 🔥’;col=’#4ade80’}

else{cat=‘زيادة’;col=’#ff6b85’}
}else{
if(bf<14){cat=‘ضعيف’;col=’#ff6b85’}
else if(bf<21){cat=‘رياضي 🔥’;col=’#4ade80’}
else if(bf<25){cat=‘لائق’;col=’#60a5fa’}

function drawProgressChart(){
const c=document.getElementById(‘weightChart’);
if(!c)return;
const data=(state.measurements[currentUser.username]||[]).filter(m=>m.weight);
if(data.length<2)return;
const ctx=c.getContext(‘2d’),W=c.width,H=c.height;
ctx.clearRect(0,0,W,H);
const weights=data.map(d=>d.weight);
const mn=Math.min(…weights)-2,mx=Math.max(…weights)+2,p=30;
ctx.strokeStyle=‘rgba(255,255,255,0.05)’;ctx.lineWidth=1;
for(let i=0;i<5;i++){const y=p+(H-p*2)*i/4;ctx.beginPath();ctx.moveTo(p,y);ctx.lineTo(W-p,y);ctx.stroke()}
ctx.strokeStyle=’#d4af37’;ctx.lineWidth=3;ctx.beginPath();
data.forEach((d,i)=>{
const x=p+(W-p*2)*i/(data.length-1);
const y=H-p-(H-p*2)*(d.weight-mn)/(mx-mn);
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
});
ctx.stroke();
data.forEach((d,i)=>{
const x=p+(W-p*2)*i/(data.length-1);
const y=H-p-(H-p*2)*(d.weight-mn)/(mx-mn);
ctx.fillStyle=’#f4cf57’;ctx.beginPath();ctx.arc(x,y,5,0,Math.PI*2);ctx.fill();
});
ctx.fillStyle=’#a0a0b0’;ctx.font=‘11px Cairo’;
ctx.fillText(`${mx.toFixed(1)}ك`,5,p+5);
ctx.fillText(`${mn.toFixed(1)}ك`,5,H-p+5);
}

function renderAttendance(){
const un=currentUser.username;
if(!state.attendanceLogs[un])state.attendanceLogs[un]=[];
const logs=state.attendanceLogs[un];
const today=new Date().toISOString().split(‘T’)[0];
const attendedToday=logs.some(l=>l.date===today);

// Calculate streak
let streak=0;
const dates=[…new Set(logs.map(l=>l.date))].sort().reverse();
for(let i=0;i<dates.length;i++){
const d=new Date(dates[i]);
const expected=new Date();
expected.setDate(expected.getDate()-i);
if(d.toISOString().split(‘T’)[0]===expected.toISOString().split(‘T’)[0])streak++;
else break;
}

// This week stats
const weekAgo=new Date();weekAgo.setDate(weekAgo.getDate()-7);
const thisWeek=logs.filter(l=>new Date(l.date)>=weekAgo).length;
const thisMonth=logs.filter(l=>{
const d=new Date(l.date);
const now=new Date();
return d.getMonth()===now.getMonth()&&d.getFullYear()===now.getFullYear();
}).length;

// Calendar for current month
const now=new Date();
const year=now.getFullYear(),month=now.getMonth();
const firstDay=new Date(year,month,1).getDay();
const daysInMonth=new Date(year,month+1,0).getDate();
const monthLogs=logs.filter(l=>{
const d=new Date(l.date);return d.getMonth()===month&&d.getFullYear()===year;
}).map(l=>new Date(l.date).getDate());

let calHtml=’<div style="display:grid;grid-template-columns:repeat(7,1fr);gap:6px;margin-top:14px">’;
[‘سبت’,‘أحد’,‘اثن’,‘ثلا’,‘أرب’,‘خمي’,‘جمع’].forEach(d=>{
calHtml+=`<div style="text-align:center;font-size:10px;color:var(--silver);padding:6px">${d}</div>`;
});
for(let i=0;i<firstDay;i++)calHtml+=’<div></div>’;
for(let d=1;d<=daysInMonth;d++){

// === GENERIC LINE CHART DRAWER ===
function drawLineChart(canvasId,data,color=’#d4af37’,unit=’’){
const c=document.getElementById(canvasId);
if(!c||data.length<2)return;
const ctx=c.getContext(‘2d’);
const W=c.width,H=c.height,p=30;
ctx.clearRect(0,0,W,H);
const values=data.map(d=>d.value);
const mn=Math.min(…values),mx=Math.max(…values);
const range=mx-mn||1;
const mnP=mn-range*0.1,mxP=mx+range*0.1;

// Grid
ctx.strokeStyle=‘rgba(255,255,255,0.05)’;ctx.lineWidth=1;
for(let i=0;i<5;i++){
const y=p+(H-p*2)*i/4;
ctx.beginPath();ctx.moveTo(p,y);ctx.lineTo(W-p,y);ctx.stroke();
}

// Gradient fill under line
const grad=ctx.createLinearGradient(0,p,0,H-p);
grad.addColorStop(0,color+‘66’);
grad.addColorStop(1,color+‘00’);
ctx.fillStyle=grad;
ctx.beginPath();
data.forEach((d,i)=>{
const x=p+(W-p*2)*i/(data.length-1);
const y=H-p-(H-p*2)*(d.value-mnP)/(mxP-mnP);
if(i===0){ctx.moveTo(x,H-p);ctx.lineTo(x,y)}
else ctx.lineTo(x,y);
});
ctx.lineTo(W-p,H-p);ctx.closePath();ctx.fill();

// Line
ctx.strokeStyle=color;ctx.lineWidth=3;ctx.beginPath();
data.forEach((d,i)=>{
const x=p+(W-p*2)*i/(data.length-1);
const y=H-p-(H-p*2)*(d.value-mnP)/(mxP-mnP);
if(i===0)ctx.moveTo(x,y);else ctx.lineTo(x,y);
});
ctx.stroke();

// Points
data.forEach((d,i)=>{
const x=p+(W-p*2)*i/(data.length-1);
const y=H-p-(H-p*2)*(d.value-mnP)/(mxP-mnP);
ctx.fillStyle=’#0a0a0f’;
ctx.beginPath();ctx.arc(x,y,6,0,Math.PI*2);ctx.fill();
ctx.fillStyle=color;
ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
});

// Labels
ctx.fillStyle=’#a0a0b0’;ctx.font=‘11px Cairo’;
ctx.fillText(`${mx.toFixed(1)}${unit}`,5,p+5);
ctx.fillText(`${mn.toFixed(1)}${unit}`,5,H-p+5);
}

document.getElementById(‘generalModal’).classList.add(‘active’);
}

function addFood(){
state.foods.push({
name:document.getElementById(‘fNewName’).value.trim(),
category:document.getElementById(‘fNewCat’).value,
cals:+document.getElementById(‘fNewCals’).value,
protein:+document.getElementById(‘fNewP’).value,
carbs:+document.getElementById(‘fNewC’).value,
fat:+document.getElementById(‘fNewF’).value
});
saveState();closeModal(‘generalModal’);
toast(‘تم الإضافة’,‘success’);showPage(‘foodLib’);
}

function deleteFood(n){
if(!confirm(‘حذف؟’))return;
state.foods=state.foods.filter(f=>f.name!==n);
saveState();showPage(‘foodLib’);
}

function openAddChallenge(){
document.getElementById(‘generalModalContent’).innerHTML=` <div class="modal-header"><h3>تحدي جديد</h3><button class="modal-close" onclick="closeModal('generalModal')">×</button></div> <div class="input-group"><label>العنوان</label><input type="text" id="chTitle"></div> <div class="input-group"><label>الوصف</label><input type="text" id="chDesc"></div> <div class="input-group"><label>الجائزة</label><input type="text" id="chReward"></div> <button class="btn btn-gold" style="width:100%" onclick="addChallenge()">إضافة</button>`;
document.getElementById(‘generalModal’).classList.add(‘active’);
}

function addChallenge(){
state.challenges.push({
id:‘c’+Date.now(),
title:document.getElementById(‘chTitle’).value,
description:document.getElementById(‘chDesc’).value,
reward:document.getElementById(‘chReward’).value,
active:true
});
saveState();closeModal(‘generalModal’);
toast(‘تم الإضافة’,‘success’);showPage(‘challenges’);
}

function deleteChallenge(id){
if(!confirm(‘حذف؟’))return;
state.challenges=state.challenges.filter(c=>c.id!==id);
saveState();showPage(‘challenges’);
}

function closeModal(id){document.getElementById(id).classList.remove(‘active’)}
function tierName(t){return {bronze:‘برونزي’,silver:‘فضي’,gold:‘ذهبي’,elite:‘النخبة’}[t]||t}
function goalName(g){return {cut:‘تنشيف’,maintain:‘تثبيت’,bulk:‘تضخيم’}[g]||’—’}
function statusName(s){return {active:‘نشط’,pending:‘معلّق’,expired:‘منتهي’}[s]||s}
function nextTierXP(t){return {bronze:500,silver:1500,gold:3000,elite:5000}[t]||0}
function tierProgress(u){
const n=nextTierXP(u.tier);
const p={bronze:0,silver:500,gold:1500,elite:3000}[u.tier]||0;
return Math.min(100,((u.xp-p)/(n-p))*100);
}

function manualSync(){
if(!CLOUD_CONFIG.enabled){toast(‘المزامنة غير مفعّلة - فعّلها من إدارة البيانات’,‘info’);return}
toast(‘جاري المزامنة…’,‘info’);
cloudSave();
setTimeout(function(){
if(cloudSyncStatus===‘synced’)toast(‘تم المزامنة’,‘success’);
else toast(‘فشلت المزامنة’,‘error’);
},3000);
}

// Init
loadCloudConfig();
loadState();
initParticles();
</script>
